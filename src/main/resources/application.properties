spring.application.name=moneymanagerproject

server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/money_manager
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.servlet.context-path=/api/v3.5.13

# JPA

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Email Configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=suryathestar70@gmail.com

spring.security.user.name=admin
spring.security.user.password=admin123
app.activation.url=http://localhost:8080
money.manager.frontend.url=http://localhost:8080
money.manager.backend.url=http://localhost:5173
spring.profiles.active=prod
